<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia - CRM de Cobros</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Capturador de Errores para evitar la pantalla azul vacía -->
    <script>
        window.addEventListener('error', function(event) {
            document.body.innerHTML += '<div style="background:#fee2e2; color:#b91c1c; padding:20px; position:fixed; top:0; left:0; right:0; z-index:9999; font-family:sans-serif;"><b>Error Crítico:</b> ' + event.message + '<br><small>' + event.filename + ' línea ' + event.lineno + '</small></div>';
        });
    </script>
    
    <!-- Babel standalone para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mapa de Importaciones Corregido (Firebase Oficial + Lucide Bundled) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

      }
    }
    </script>
</head>
<body class="bg-[#0f172a] text-slate-200">
    <div id="root"></div>

    <!-- Script Principal de React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Users, Plus, Search, Calendar, Trash2, Camera, ChevronLeft, 
          ChevronRight, Loader2, FileText, Home, Printer, X, AlertTriangle, 
          CheckCircle2, Check, Bell, CalendarPlus, Sparkles, Copy, RefreshCw, 
          MessageSquare, ArrowUpRight, ArrowDownLeft, History, Download, 
          FileSpreadsheet, Pencil, UploadCloud, Receipt, Calculator, RotateCcw, 
          MoreVertical, Lock, Key, Settings, PackagePlus
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from 'firebase/firestore';

        // =====================================================================
        // 🔥 TU CONFIGURACIÓN REAL DE FIREBASE 🔥
        // =====================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyB_7s03qxv_0LxyFupa8oySd21FqaNXaP4",
          authDomain: "cobros-noname.firebaseapp.com",
          projectId: "cobros-noname",
          storageBucket: "cobros-noname.firebasestorage.app",
          messagingSenderId: "554797927339",
          appId: "1:554797927339:web:32177ad0102498551aa0ee",
          measurementId: "G-FP02L3JRBH"
        };
        // =====================================================================

        // Inicialización de Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'marketing-crm-final-v5'; // ID único para tu base de datos

        const App = () => {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [clients, setClients] = useState([]);
          const [payments, setPayments] = useState({});
          const [allPaymentsRaw, setAllPaymentsRaw] = useState([]); 
          const [extras, setExtras] = useState([]); 
          
          const [agencyLogo, setAgencyLogo] = useState(null);
          const [agencyBanner, setAgencyBanner] = useState(null);
          const [agencyName, setAgencyName] = useState("No Name Agency");
          const [agencyPhone, setAgencyPhone] = useState("0412-1836418");
          const [agencyEmail, setAgencyEmail] = useState("nonameagency.ve@gmail.com");

          const [activeTab, setActiveTab] = useState('list');
          const [selectedDate, setSelectedDate] = useState(new Date());
          const [selectedCalendarDay, setSelectedCalendarDay] = useState(new Date().getDate());
          const monthYearKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}`;

          const [searchTerm, setSearchTerm] = useState('');
          const [filterStatus, setFilterStatus] = useState('all');
          const [sortBy, setSortBy] = useState('billingDay'); 

          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isAbonoModalOpen, setIsAbonoModalOpen] = useState(null);
          const [isNotifOpen, setIsNotifOpen] = useState(false);
          const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
          const [historyClient, setHistoryClient] = useState(null);
          const [clientToDelete, setClientToDelete] = useState(null);
          const [abonoAmount, setAbonoAmount] = useState('');

          const [isExtraModalOpen, setIsExtraModalOpen] = useState(null);
          const [extraForm, setExtraForm] = useState({ description: '', amount: '' });

          const [isHeaderMenuOpen, setIsHeaderMenuOpen] = useState(false);
          const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);

          const [invoiceClientId, setInvoiceClientId] = useState('');
          const [tasaBCV, setTasaBCV] = useState('');
          const [facturaIncludesIva, setFacturaIncludesIva] = useState(false);
          
          const [rates, setRates] = useState({ usd: 0, eur: 0, loading: true, error: false });
          const [calc, setCalc] = useState({ amount: '', from: 'USD', customUsd: '', customEur: '', useCustom: false });

          const [isAIModalOpen, setIsAIModalOpen] = useState(false);
          const [aiTargetClient, setAiTargetClient] = useState(null);
          const [aiTone, setAiTone] = useState('amable'); 
          const [aiMessageType, setAiMessageType] = useState('cobro'); 
          const [generatedText, setGeneratedText] = useState('');
          const [isGeneratingAI, setIsGeneratingAI] = useState(false);
          
          const [isUploading, setIsUploading] = useState(false);
          const [toastMessage, setToastMessage] = useState('');

          const [isUnlocked, setIsUnlocked] = useState(false);
          const [appPin, setAppPin] = useState(null); 
          const [isSettingsLoaded, setIsSettingsLoaded] = useState(false);
          const [pinInput, setPinInput] = useState('');
          const [pinError, setPinError] = useState(false);
          const [isRecoverMode, setIsRecoverMode] = useState(false);
          const [recoverEmail, setRecoverEmail] = useState('');
          const [isChangePinModalOpen, setIsChangePinModalOpen] = useState(false);
          const [newPinInput, setNewPinInput] = useState('');

          const [newClient, setNewClient] = useState({
            name: '', service: '', monthlyFee: '', billingDay: '', phone: '', clientLogo: null, currency: '$'
          });

          const agencyFileInputRef = useRef(null);
          const agencyBannerInputRef = useRef(null);
          const clientFileInputRef = useRef(null);
          const importFileInputRef = useRef(null);
          const importJsonFileInputRef = useRef(null);

          const enviarNotificacionTelegram = async (mensaje) => {
            const token = '8260372966:AAEvVQrjYrQBBc7jJbYjf91YdG8osqYYWOw';
            const chatId = '-1003528479716';
            const url = `https://api.telegram.org/bot${token}/sendMessage`;

            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: mensaje, parse_mode: 'Markdown' })
                });
            } catch (error) {
                console.error("Error al enviar notificación a Telegram:", error);
            }
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) {
                console.error("Error Auth:", error);
              } finally {
                setAuthLoading(false);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => setUser(currentUser));
            
            const fetchRates = async () => {
                setRates(prev => ({...prev, loading: true, error: false}));
                try {
                    const [usdRes, eurRes] = await Promise.all([
                        fetch('https://ve.dolarapi.com/v1/dolares/oficial'),
                        fetch('https://ve.dolarapi.com/v1/euros/oficial')
                    ]);
                    const usdData = await usdRes.json();
                    const eurData = await eurRes.json();
                    const currentUsd = usdData.promedio || 0;
                    const currentEur = eurData.promedio || 0;
                    setRates({ usd: currentUsd, eur: currentEur, loading: false, error: false });
                    setCalc(prev => ({
                        ...prev,
                        customUsd: prev.customUsd || currentUsd.toString(),
                        customEur: prev.customEur || currentEur.toString()
                    }));
                } catch (error) {
                    console.error("Error fetching rates", error);
                    setRates(prev => ({...prev, loading: false, error: true}));
                }
            };
            fetchRates();

            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;

            const clientsRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            const paymentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'payments');
            const extrasRef = collection(db, 'artifacts', appId, 'public', 'data', 'extras');
            const agencyRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency');

            const unsubClients = onSnapshot(clientsRef, (snapshot) => {
              const loadedClients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
              loadedClients.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
              setClients(loadedClients);
            }, (error) => console.error("Error clients:", error));

            const unsubPayments = onSnapshot(paymentsRef, (snapshot) => {
              const pMap = {};
              const rawList = [];
              snapshot.docs.forEach(d => { 
                const data = d.data();
                pMap[`${data.clientId}_${data.monthYear}`] = data.amount; 
                rawList.push({ id: d.id, ...data });
              });
              setPayments(pMap);
              setAllPaymentsRaw(rawList); 
            }, (error) => console.error("Error payments:", error));

            const unsubExtras = onSnapshot(extrasRef, (snapshot) => {
                const loadedExtras = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                setExtras(loadedExtras);
            }, (error) => console.error("Error extras:", error));

            const unsubAgency = onSnapshot(agencyRef, (d) => {
              setIsSettingsLoaded(true);
              if (d.exists()) {
                const data = d.data();
                if (data.logo) setAgencyLogo(data.logo);
                if (data.banner) setAgencyBanner(data.banner);
                if (data.name) setAgencyName(data.name);
                if (data.phone) setAgencyPhone(data.phone);
                if (data.email) setAgencyEmail(data.email);
                if (data.pinCode !== undefined) setAppPin(data.pinCode);
                else setAppPin('');
              } else {
                setAppPin('');
              }
            });

            return () => { unsubClients(); unsubPayments(); unsubExtras(); unsubAgency(); };
          }, [user]);

          useEffect(() => {
            if (!user || clients.length === 0) return;

            const checkAndSendDailyNotifications = () => {
                const now = new Date();
                const currentHour = now.getHours();
                const currentDay = now.getDate();
                const todayStr = now.toLocaleDateString('es-ES');
                const monthKey = `${now.getFullYear()}-${now.getMonth() + 1}`;

                if (currentHour >= 9) {
                    const lastNotifiedDate = localStorage.getItem('telegram_daily_sent_date');
                    if (lastNotifiedDate !== todayStr) {
                        const pendingClientsToday = clients.filter(c => {
                            const isBillingDay = Number(c.billingDay) === currentDay;
                            const paidAmount = payments[`${c.id}_${monthKey}`] || 0;
                            return isBillingDay && paidAmount < c.monthlyFee;
                        });

                        if (pendingClientsToday.length > 0) {
                            let msg = `🕘 *¡AVISO DE COBROS PARA HOY!*\n📅 Fecha: ${todayStr}\n\n`;
                            pendingClientsToday.forEach(client => {
                                msg += `👉 👤 *${client.name}* | 💰 Monto: ${client.currency || '$'}${client.monthlyFee}\n`;
                            });
                            enviarNotificacionTelegram(msg);
                        } else {
                            const msgLibre = `🎉 *¡Día libre de cobros!*\n📅 Fecha: ${todayStr}\nNo tienes clientes programados para facturar el día de hoy.`;
                            enviarNotificacionTelegram(msgLibre);
                        }
                        localStorage.setItem('telegram_daily_sent_date', todayStr);
                    }
                }
            };

            checkAndSendDailyNotifications();
            const intervalId = setInterval(checkAndSendDailyNotifications, 60000); 

            return () => clearInterval(intervalId);
          }, [clients, payments, user]);

          useEffect(() => {
            if (agencyName) document.title = agencyName;
            if (agencyLogo) {
              const updateIcon = (selector, href) => {
                let link = document.querySelector(selector);
                if (!link) {
                  link = document.createElement('link');
                  if (selector.includes('shortcut')) link.rel = 'shortcut icon';
                  else if (selector.includes('apple')) link.rel = 'apple-touch-icon';
                  else link.rel = 'icon';
                  document.head.appendChild(link);
                }
                link.href = href;
              };
              updateIcon('link[rel="icon"]', agencyLogo);
              updateIcon('link[rel="shortcut icon"]', agencyLogo);
              updateIcon('link[rel="apple-touch-icon"]', agencyLogo);
            }
          }, [agencyName, agencyLogo]);

          const getClientExtras = (clientId) => {
              return extras.filter(e => e.clientId === clientId && e.monthYear === monthYearKey);
          };

          const getClientExtrasTotal = (clientId) => {
              return getClientExtras(clientId).reduce((sum, e) => sum + Number(e.amount), 0);
          };

          const getPaidAmount = (clientId) => payments[`${clientId}_${monthYearKey}`] || 0;
          
          const getClientStatus = (client) => {
            const paid = getPaidAmount(client.id); 
            const extrasTotal = getClientExtrasTotal(client.id);
            const total = (client.monthlyFee || 0) + extrasTotal;

            if (paid <= 0) return { label: 'PENDIENTE', color: 'text-red-400 bg-red-500/10 border-red-500/20', type: 'pending' };
            if (paid < total) return { label: 'ABONO', color: 'text-orange-400 bg-orange-500/10 border-orange-500/20', type: 'partial' };
            return { label: 'PAGADO', color: 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20', type: 'paid' };
          };

          const stats = useMemo(() => {
            let totalUSD = 0, collectedUSD = 0, totalEUR = 0, collectedEUR = 0;
            clients.forEach(c => {
                const extrasTotal = getClientExtrasTotal(c.id);
                const fee = (c.monthlyFee || 0) + extrasTotal; 
                const paid = getPaidAmount(c.id);
                if (c.currency === '€') { 
                    totalEUR += fee; 
                    collectedEUR += paid; 
                } else { 
                    totalUSD += fee; 
                    collectedUSD += paid; 
                }
            });
            return { 
                totalUSD, collectedUSD, pendingUSD: totalUSD - collectedUSD, 
                totalEUR, collectedEUR, pendingEUR: totalEUR - collectedEUR 
            };
          }, [clients, payments, extras, monthYearKey]);

          const handleImageUpload = (e, callback) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7); callback(dataUrl);
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          };

          const openEditModal = (client) => {
            setNewClient({
              id: client.id, name: client.name, service: client.service, monthlyFee: client.monthlyFee,
              billingDay: client.billingDay, clientLogo: client.clientLogo || null, currency: client.currency || '$'
            });
            setIsModalOpen(true);
          };

          const saveClient = async (e) => {
            e.preventDefault();
            if (!user || !newClient.name) return;
            try {
              const clientData = {
                name: newClient.name, service: newClient.service, monthlyFee: Number(newClient.monthlyFee),
                billingDay: Number(newClient.billingDay), clientLogo: newClient.clientLogo || null, currency: newClient.currency || '$'
              };

              if (newClient.id) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', newClient.id), { ...clientData, updatedAt: new Date().toISOString() }, { merge: true });
              } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), { ...clientData, createdAt: new Date().toISOString() });
              }
              
              setIsModalOpen(false);
              setNewClient({ name: '', service: '', monthlyFee: '', billingDay: '', phone: '', clientLogo: null, currency: '$' });
              if (activeTab === 'list' || activeTab === 'clients') {
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 300);
              }
            } catch (e) { console.error(e); }
          };

          const confirmDeleteClient = async () => {
            if (!user || !clientToDelete) return;
            try {
              await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', clientToDelete.id));
              setClientToDelete(null);
            } catch (e) { console.error(e); }
          };

          const handleFullPayment = async (client) => {
            if (!user) return;
            try {
              const extrasTotal = getClientExtrasTotal(client.id);
              const totalAmount = Number(client.monthlyFee) + extrasTotal;
              const paymentId = `${client.id}_${monthYearKey}`;
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'payments', paymentId), { 
                clientId: client.id, monthYear: monthYearKey, amount: totalAmount, updatedAt: new Date().toISOString()
              }, { merge: true });

              const dateStr = new Date().toLocaleDateString('es-ES');
              const msg = `✅ *¡PAGO REGISTRADO!*\n👤 Cliente: ${client.name}\n💰 Monto: ${client.currency || '$'}${totalAmount}\n📅 Fecha: ${dateStr}`;
              enviarNotificacionTelegram(msg);

            } catch (e) { console.error(e); }
          };

          const revertPayment = async (client) => {
            if (!user) return;
            try {
              const paymentId = `${client.id}_${monthYearKey}`;
              await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'payments', paymentId));
              setToastMessage('Pago revertido a pendiente');
              setTimeout(() => setToastMessage(''), 3000);
            } catch (e) { console.error(e); }
          };

          const registerAbono = async (e) => {
            e.preventDefault();
            if (!user || !isAbonoModalOpen) return;
            try {
              const currentPaid = getPaidAmount(isAbonoModalOpen);
              const totalAbonado = currentPaid + Number(abonoAmount);
              const paymentId = `${isAbonoModalOpen}_${monthYearKey}`;
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'payments', paymentId), { 
                clientId: isAbonoModalOpen, monthYear: monthYearKey, amount: totalAbonado, updatedAt: new Date().toISOString()
              }, { merge: true });

              const clientAbono = clients.find(c => c.id === isAbonoModalOpen);
              const dateStr = new Date().toLocaleDateString('es-ES');
              const msg = `💸 *¡ABONO REGISTRADO!*\n👤 Cliente: ${clientAbono?.name}\n💰 Monto: ${clientAbono?.currency || '$'}${abonoAmount}\n📅 Fecha: ${dateStr}`;
              enviarNotificacionTelegram(msg);

              setIsAbonoModalOpen(null);
              setAbonoAmount('');
            } catch (e) { console.error(e); }
          };

          const saveExtra = async (e) => {
            e.preventDefault();
            if (!user || !isExtraModalOpen || !extraForm.description || !extraForm.amount) return;
            try {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'extras'), {
                  clientId: isExtraModalOpen, monthYear: monthYearKey, description: extraForm.description, amount: Number(extraForm.amount), createdAt: new Date().toISOString()
              });
              setExtraForm({ description: '', amount: '' });
              setToastMessage('Cobro extra agregado'); setTimeout(() => setToastMessage(''), 3000);
            } catch (e) { console.error(e); }
          };

          const deleteExtra = async (extraId) => {
            if (!user) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'extras', extraId));
                setToastMessage('Extra eliminado'); setTimeout(() => setToastMessage(''), 3000);
            } catch (e) { console.error(e); }
          };

          const addToCalendar = (client) => {
            const now = new Date(); const currentYear = now.getFullYear(); const currentMonth = now.getMonth(); 
            let day = parseInt(client.billingDay); if (isNaN(day)) day = 1;
            const pad = (n) => n < 10 ? '0' + n : n;
            const startStr = `${currentYear}${pad(currentMonth + 1)}${pad(day)}`;
            const startTime = `${startStr}T090000`; const endTime = `${startStr}T093000`;
            const title = encodeURIComponent(`Cobro: ${client.name}`);
            const details = encodeURIComponent(`Recordatorio de cobro mensual.\nServicio: ${client.service}\nMonto: ${client.currency || '$'}${client.monthlyFee}`);
            const location = encodeURIComponent("Online"); const recurrence = "RRULE:FREQ=MONTHLY";
            const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startTime}/${endTime}&details=${details}&location=${location}&recur=${recurrence}`;
            window.open(url, '_blank');
          };

          const openReceipt = (client, type = 'cobro') => {
            const paid = getPaidAmount(client.id); 
            const extrasTotal = getClientExtrasTotal(client.id);
            const totalAmount = client.monthlyFee + extrasTotal;
            const remaining = totalAmount - paid; 
            const displayAmount = type === 'cobro' ? remaining : paid;
            const currency = client.currency || '$'; 
            const months = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
            const currentMonthName = months[selectedDate.getMonth()]; 
            const dateStr = `${client.billingDay || 1} DE ${currentMonthName} ${selectedDate.getFullYear()}`;
            
            let rowsHtml = `<tr><td class="row-description">MENSUALIDAD DE<br>${currentMonthName}</td><td class="text-center">1</td><td class="text-right">${currency}${client.monthlyFee}</td><td class="text-right">${currency}${client.monthlyFee}</td></tr>`;
            
            const clientExtrasList = getClientExtras(client.id);
            clientExtrasList.forEach(ex => {
                rowsHtml += `<tr><td class="row-description">EXTRA: ${ex.description.toUpperCase()}</td><td class="text-center">1</td><td class="text-right">${currency}${ex.amount}</td><td class="text-right">${currency}${ex.amount}</td></tr>`;
            });

            const htmlContent = `
              <!DOCTYPE html>
              <html>
                <head>
                  <title>Recibo - ${client.name}</title>
                  <style>
                    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');
                    body { font-family: 'Montserrat', sans-serif; padding: 50px; color: #000; max-width: 800px; margin: 0 auto; background: #fff; line-height: 1.5; }
                    .header-container { margin-bottom: 40px; }
                    .main-title { font-size: 32px; font-weight: 900; letter-spacing: 2px; line-height: 1.2; color: #000; margin-bottom: 30px; }
                    .info-block { font-size: 14px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
                    .table-container { margin-top: 40px; margin-bottom: 50px; }
                    table { width: 100%; border-collapse: collapse; }
                    th { text-align: left; font-size: 11px; font-weight: 900; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 12px 5px; text-transform: uppercase; letter-spacing: 1px; }

          const generarFacturaLegalPDF = () => {
            const clientToInvoice = clients.find(c => c.id === invoiceClientId);
            if (!clientToInvoice || !tasaBCV) return;

            const rate = Number(tasaBCV); 
            const extrasTotal = getClientExtrasTotal(clientToInvoice.id);
            const feeOriginal = Number(clientToInvoice.monthlyFee) + extrasTotal;
            
            let baseImponible, iva, totalBs;
            if (facturaIncludesIva) { totalBs = feeOriginal * rate; baseImponible = totalBs / 1.16; iva = totalBs - baseImponible; } 
            else { baseImponible = feeOriginal * rate; iva = baseImponible * 0.16; totalBs = baseImponible + iva; }

            const currency = clientToInvoice.currency || '$';
            const dateStr = selectedDate.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' });
            
            const principalBs = clientToInvoice.monthlyFee * rate;
            let rowsHtml = `<tr><td class="row-description">Honorarios Profesionales por ${clientToInvoice.service} (Mes en curso)</td><td class="text-center">1</td><td class="text-right">${principalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td><td class="text-right">${principalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td></tr>`;

                  </style>
                </head>
                <body>
                  <div class="header-container">
                    <div>
                      <div class="main-title">${agencyName.toUpperCase()}</div>
                      <div class="info-block">${agencyPhone} | ${agencyEmail}</div>

                    </div>
                  </div>
                  <div style="margin-bottom: 30px;">
                    <div class="info-block" style="font-weight: 800; font-size: 14px;">CLIENTE: ${clientToInvoice.name.toUpperCase()}</div>
                    <div class="info-block">SERVICIO: ${clientToInvoice.service.toUpperCase()}</div>
                  </div>
                  <div class="table-container">
                    <table>
                      <thead><tr><th class="row-description">DESCRIPCIÓN</th><th class="text-center">CANT.</th><th class="text-right">PRECIO UNIT. (Bs)</th><th class="text-right">SUBTOTAL (Bs)</th></tr></thead>

                    <div class="total-row"><span>BASE IMPONIBLE:</span> <span>Bs. ${baseImponible.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span></div>

                    <div class="total-row final"><span>TOTAL A PAGAR:</span> <span>Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span></div>
                  </div>
                  <div class="tasa-info">* Equivalente a ${currency}${feeOriginal.toLocaleString('es-VE', {minimumFractionDigits: 2})} calculado a la Tasa de Cambio BCV de Bs. ${rate.toLocaleString('es-VE', {minimumFractionDigits: 2})} por ${currency === '€' ? 'Euro' : 'Dólar'}.</div>
                  <a href="javascript:window.print()" class="btn-print">Imprimir / Guardar PDF Fiscal</a>

            `;
            const newWindow = window.open('', '_blank');
            if (newWindow) { newWindow.document.write(htmlContent); newWindow.document.close(); } else { alert("Por favor, permite las ventanas emergentes para ver la factura."); }
          };

          const exportToCSV = () => {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID Cliente,Nombre Cliente,Servicio,Monto Mensual,Moneda,Dia Cobro,ID Pago,Mes Cobrado (Año-Mes),Monto Pagado,Fecha Registro,Agencia Nombre,Agencia Telefono,Agencia Correo\n";

            let isFirstRow = true;
            const getAgencyData = () => {
                if (isFirstRow) { isFirstRow = false; return `,"${agencyName || ''}","${agencyPhone || ''}","${agencyEmail || ''}"`; }
                return `,"","",""`;
            };

            if (clients.length === 0) csvContent += `,,,,,,,,${getAgencyData()}\n`;

            clients.forEach(client => {
                const clientPayments = allPaymentsRaw.filter(p => p.clientId === client.id);
                if (clientPayments.length === 0) {
                    const row = [client.id, `"${client.name || ''}"`, `"${client.service || ''}"`, client.monthlyFee || 0, `"${client.currency || '$'}"`, client.billingDay || 1, "","",0,""].join(",") + getAgencyData();
                    csvContent += row + "\n";
                } else {
                    clientPayments.forEach(payment => {
                        const row = [client.id, `"${client.name || ''}"`, `"${client.service || ''}"`, client.monthlyFee || 0, `"${client.currency || '$'}"`, client.billingDay || 1, payment.id, payment.monthYear, payment.amount || 0, payment.updatedAt ? new Date(payment.updatedAt).toLocaleDateString() : 'N/A'].join(",") + getAgencyData();
                        csvContent += row + "\n";
                    });
                }
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Respaldo_Agencia_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };

          const importFromCSV = async (e) => {
            const file = e.target.files[0];
            if (!file || !user) return;
            setIsUploading(true);

            const reader = new FileReader();
            reader.onload = async (event) => {
                const text = event.target.result;
                const lines = text.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) { setToastMessage("El archivo CSV está vacío o no es válido"); setTimeout(() => setToastMessage(''), 3000); setIsUploading(false); return; }
                
                const headerLine = lines[0];
                const isOldFormat = !headerLine.includes("Dia Cobro"); 
                const hasMoneda = headerLine.includes("Moneda");
                
                const dataLines = lines.slice(1);
                const clientsToRestore = new Map();
                const paymentsToRestore = [];
                let importedAgencySettings = null;

                dataLines.forEach(line => {
                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (row.length >= 7) {
                        const clientId = row[0]?.replace(/^"|"$/g, '').trim();
                        const clientName = row[1]?.replace(/^"|"$/g, '').trim();
                        const clientService = row[2]?.replace(/^"|"$/g, '').trim();
                        const monthlyFee = Number(row[3]);
                        
                        let billingDay = 1, paymentId, monthYear, amount, currency = '$';

                        if (isOldFormat) {
                            paymentId = row[4]?.replace(/^"|"$/g, '').trim(); monthYear = row[5]?.replace(/^"|"$/g, '').trim(); amount = Number(row[6]);
                        } else if (!hasMoneda) {
                            billingDay = Number(row[4]) || 1; paymentId = row[5]?.replace(/^"|"$/g, '').trim(); monthYear = row[6]?.replace(/^"|"$/g, '').trim(); amount = Number(row[7]);
                            if (!importedAgencySettings && row.length >= 12 && row[9]) {
                                const parsedAgencyName = row[9].replace(/^"|"$/g, '').trim();
                                if (parsedAgencyName) { importedAgencySettings = { name: parsedAgencyName, phone: row[10]?.replace(/^"|"$/g, '').trim() || '', email: row[11]?.replace(/^"|"$/g, '').trim() || '' }; }
                            }
                        } else {
                            currency = row[4]?.replace(/^"|"$/g, '').trim() || '$'; billingDay = Number(row[5]) || 1; paymentId = row[6]?.replace(/^"|"$/g, '').trim(); monthYear = row[7]?.replace(/^"|"$/g, '').trim(); amount = Number(row[8]);
                            if (!importedAgencySettings && row.length >= 13 && row[10]) {
                                const parsedAgencyName = row[10].replace(/^"|"$/g, '').trim();
                                if (parsedAgencyName) { importedAgencySettings = { name: parsedAgencyName, phone: row[11]?.replace(/^"|"$/g, '').trim() || '', email: row[12]?.replace(/^"|"$/g, '').trim() || '' }; }
                            }
                        }

                        if (clientId && clientName) {
                            clientsToRestore.set(clientId, { name: clientName, service: clientService, monthlyFee: isNaN(monthlyFee) ? 0 : monthlyFee, currency: currency, billingDay: billingDay, createdAt: new Date().toISOString() });
                        }
                        if (paymentId && monthYear) { paymentsToRestore.push({ id: paymentId, clientId: clientId, monthYear: monthYear, amount: isNaN(amount) ? 0 : amount, updatedAt: new Date().toISOString() }); }
                    }
                });

                try {
                    if (importedAgencySettings) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency'), importedAgencySettings, { merge: true }); }
                    for (const [id, data] of clientsToRestore.entries()) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id), data, { merge: true }); }
                    for (const pay of paymentsToRestore) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'payments', pay.id), { clientId: pay.clientId, monthYear: pay.monthYear, amount: pay.amount, updatedAt: pay.updatedAt }, { merge: true }); }
                    setToastMessage('¡Respaldo CSV importado con éxito!'); setTimeout(() => setToastMessage(''), 3000);
                } catch (error) { setToastMessage('Hubo un error al procesar el respaldo CSV.'); setTimeout(() => setToastMessage(''), 3000); } 
                finally { if (importFileInputRef.current) importFileInputRef.current.value = ''; setIsUploading(false); }
            };
            reader.readAsText(file);
          };

          const exportToJSON = () => {
            const backupData = { settings: { name: agencyName, phone: agencyPhone, email: agencyEmail, logo: agencyLogo, banner: agencyBanner }, clients: clients, payments: allPaymentsRaw, extras: extras };
            const jsonStr = JSON.stringify(backupData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });

            const link = document.createElement("a");
            link.href = url; link.download = `Respaldo_Completo_App_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
          };

          const importFromJSON = async (e) => {
            const file = e.target.files[0];
            if (!file || !user) return;
            setIsUploading(true);
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const parsedData = JSON.parse(event.target.result);
                    if (parsedData.settings) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency'), parsedData.settings, { merge: true }); }

                    if (parsedData.payments && Array.isArray(parsedData.payments)) { for (const payment of parsedData.payments) { if (payment.id) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'payments', payment.id), payment, { merge: true }); } } }
                    if (parsedData.extras && Array.isArray(parsedData.extras)) { for (const extra of parsedData.extras) { if (extra.id) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'extras', extra.id), extra, { merge: true }); } } }
                    setToastMessage('¡Clonación de datos completada (JSON)!');
                } catch (error) { console.error("Error importando JSON:", error); setToastMessage('Error al leer el archivo JSON.'); } 
                finally { setTimeout(() => setToastMessage(''), 3000); if (importJsonFileInputRef.current) importJsonFileInputRef.current.value = ''; setIsUploading(false); }
            };
            reader.readAsText(file);

            else if (sortBy === 'creation') { result.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0)); }
            return result;
          }, [clients, payments, extras, searchTerm, filterStatus, monthYearKey, sortBy]);

                  else { setPinError(true); setTimeout(() => setPinError(false), 2000); }
              } else {
                  if (pinInput === appPin) { setIsUnlocked(true); setPinInput(''); } 
                  else { setPinError(true); setPinInput(''); setTimeout(() => setPinError(false), 2000); }
              }
            };

            const handleRecoverSubmit = async (e) => {
                e.preventDefault();
                if (recoverEmail.toLowerCase().trim() === agencyEmail.toLowerCase().trim()) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency'), { pinCode: '' }, { merge: true });
                    setAppPin(''); setIsRecoverMode(false); setRecoverEmail(''); setToastMessage('PIN restablecido. Crea uno nuevo.'); setTimeout(() => setToastMessage(''), 3000);
                } else { setPinError(true); setTimeout(() => setPinError(false), 2000); }
            };

            return (
              <div className="min-h-screen bg-[#0f172a] flex items-center justify-center p-4 font-sans">
                {toastMessage && (<div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-[#3f979b] text-white px-4 py-2 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2 animate-in slide-in-from-top-4"><CheckCircle2 size={16} />{toastMessage}</div>)}
                <div className="bg-slate-900 border border-slate-800 p-8 rounded-[32px] shadow-2xl max-w-sm w-full text-center animate-in zoom-in duration-300">
                  <div className="w-16 h-16 bg-[#8bf5fa]/10 rounded-2xl flex items-center justify-center mx-auto mb-6">{isRecoverMode ? <Key size={32} className="text-[#8bf5fa]" /> : <Lock size={32} className="text-[#8bf5fa]" />}</div>
                  {isRecoverMode ? (
                      <>
                          <h1 className="text-xl font-black text-white uppercase tracking-wide mb-2">Recuperar PIN</h1>
                          <p className="text-xs text-slate-400 mb-8 px-4">Ingresa el correo electrónico de tu agencia ({agencyEmail.substring(0,3)}***) para restablecer el PIN.</p>
                          <form onSubmit={handleRecoverSubmit}>
                              <input type="email" autoFocus value={recoverEmail} onChange={e => setRecoverEmail(e.target.value)} className={`w-full bg-slate-950 border ${pinError ? 'border-red-500 text-red-500' : 'border-slate-800 text-white'} rounded-xl p-4 text-center text-sm font-black outline-none focus:border-[#8bf5fa] transition-colors mb-6`} placeholder="correo@agencia.com" />
                              <button type="submit" className="w-full bg-[#3f979b] hover:bg-[#327a7d] text-white font-black py-4 rounded-xl uppercase text-xs transition-transform active:scale-95 shadow-lg shadow-[#3f979b]/20 mb-3">Verificar Correo</button>
                              <button type="button" onClick={() => { setIsRecoverMode(false); setPinError(false); }} className="w-full text-slate-500 font-black text-[10px] uppercase hover:text-white transition-colors">Cancelar</button>
                          </form>
                      </>
                  ) : (
                      <>
                          <h1 className="text-xl font-black text-white uppercase tracking-wide mb-2">{appPin === '' ? 'Configurar Seguridad' : 'App Bloqueada'}</h1>
                          <p className="text-xs text-slate-400 mb-8 px-4">{appPin === '' ? 'Crea un PIN numérico (mín. 4 dígitos) para proteger el acceso a tus datos.' : 'Ingresa tu PIN de seguridad para acceder.'}</p>
                          <form onSubmit={handlePinSubmit}>
                              <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus value={pinInput} onChange={e => setPinInput(e.target.value)} className={`w-full bg-slate-950 border ${pinError ? 'border-red-500 text-red-500' : 'border-slate-800 text-[#f9f54b]'} rounded-xl p-4 text-center text-3xl tracking-[0.5em] font-black outline-none focus:border-[#8bf5fa] transition-colors mb-6`} placeholder="••••" />
                              <button type="submit" className="w-full bg-[#3f979b] hover:bg-[#327a7d] text-white font-black py-4 rounded-xl uppercase text-xs transition-transform active:scale-95 shadow-lg shadow-[#3f979b]/20">{appPin === '' ? 'Guardar PIN' : 'Desbloquear'}</button>
                          </form>
                          {appPin !== '' && (<button onClick={() => { setIsRecoverMode(true); setPinError(false); setPinInput(''); }} className="mt-6 text-slate-500 font-black text-[10px] uppercase hover:text-[#8bf5fa] transition-colors">¿Olvidaste tu PIN?</button>)}
                      </>
                  )}
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#0f172a] text-slate-200 p-3 md:p-8 font-sans" style={{ paddingBottom: '200px' }}>
              {toastMessage && (<div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-[#3f979b] text-white px-4 py-2 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2 animate-in slide-in-from-top-4"><CheckCircle2 size={16} />{toastMessage}</div>)}

              <div className="max-w-2xl mx-auto">
                {(activeTab !== 'clients' && activeTab !== 'invoice') && (
                  <div className="animate-in fade-in duration-300">
                    <div className="flex flex-col gap-4 mb-6">

                    </div>
                  </div>
                )}

                {isChangePinModalOpen && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 w-full max-w-[280px] rounded-[32px] p-6 text-center shadow-2xl animate-in zoom-in duration-200">
                      <div className="w-12 h-12 bg-[#8bf5fa]/10 rounded-full flex items-center justify-center mx-auto mb-4"><Key className="text-[#8bf5fa]" size={24} /></div>
                      <h3 className="text-white font-black text-sm uppercase mb-2">Cambiar PIN</h3>
                      <p className="text-[10px] text-slate-400 mb-6 uppercase leading-relaxed px-2">Ingresa tu nuevo PIN de seguridad (mín. 4 dígitos).</p>
                      <form onSubmit={async (e) => {
                          e.preventDefault();
                          if (newPinInput.length >= 4) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency'), { pinCode: newPinInput }, { merge: true }); setAppPin(newPinInput); setIsChangePinModalOpen(false); setNewPinInput(''); setToastMessage('PIN actualizado con éxito'); setTimeout(() => setToastMessage(''), 3000); } 
                          else { setPinError(true); setTimeout(() => setPinError(false), 2000); }
                      }}>
                        <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus value={newPinInput} onChange={e => setNewPinInput(e.target.value)} className={`w-full bg-slate-950 border ${pinError ? 'border-red-500 text-red-500' : 'border-slate-800 text-[#f9f54b]'} rounded-xl p-4 text-center text-2xl tracking-[0.3em] font-black outline-none focus:border-[#8bf5fa] transition-colors mb-4`} placeholder="••••" />
                        <div className="flex flex-col gap-2"><button type="submit" className="bg-[#3f979b] hover:bg-[#327a7d] text-white font-black py-3 rounded-xl text-[10px] uppercase transition-colors">Actualizar PIN</button><button type="button" onClick={() => { setIsChangePinModalOpen(false); setNewPinInput(''); setPinError(false); }} className="text-slate-500 hover:text-white font-black py-2 text-[9px] uppercase transition-colors">Cancelar</button></div>
                      </form>
                    </div>
                  </div>
                )}

                {isSettingsModalOpen && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[32px] overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
                      <div className="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-950/30"><div className="flex items-center gap-2"><Settings size={18} className="text-[#8bf5fa]" /><h2 className="font-black text-sm text-white uppercase tracking-wide">Configuración</h2></div><button onClick={() => setIsSettingsModalOpen(false)} className="text-slate-500 hover:text-[#f9f54b]"><X size={20}/></button></div>
                      <form onSubmit={async (e) => {
                          e.preventDefault();
                          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'agency'), { name: agencyName, phone: agencyPhone, email: agencyEmail }, { merge: true });
                          setIsSettingsModalOpen(false); setToastMessage('Configuración guardada'); setTimeout(() => setToastMessage(''), 3000);
                      }} className="p-6 space-y-4">
                        <div><label className="text-[9px] font-black text-[#8bf5fa] uppercase ml-2 mb-1 block">Nombre de la Agencia</label><input required type="text" placeholder="Ej: Mi Agencia Digital" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-[#8bf5fa] transition-colors" value={agencyName} onChange={e => setAgencyName(e.target.value)} /></div>
                        <div><label className="text-[9px] font-black text-[#8bf5fa] uppercase ml-2 mb-1 block">Teléfono (Para Recibos y Facturas)</label><input required type="tel" placeholder="Ej: +58 412 1234567" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-[#8bf5fa] transition-colors" value={agencyPhone} onChange={e => setAgencyPhone(e.target.value)} /></div>
                        <div><label className="text-[9px] font-black text-[#8bf5fa] uppercase ml-2 mb-1 block">Correo de Recuperación / Contacto</label><input required type="email" placeholder="correo@agencia.com" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-[#8bf5fa] transition-colors" value={agencyEmail} onChange={e => setAgencyEmail(e.target.value)} /></div>
                        <button type="submit" className="w-full bg-[#3f979b] hover:bg-[#327a7d] text-white font-black py-4 rounded-xl uppercase text-[10px] mt-4 transition-colors shadow-lg shadow-[#3f979b]/20">Guardar Cambios</button>
                      </form>
                    </div>
                  </div>
                )}

                {/* BARRA DE NAVEGACIÓN INFERIOR */}
                <div className="fixed bottom-0 left-0 right-0 z-[90] flex justify-center pointer-events-none">
                    <div className="bg-slate-900/90 backdrop-blur-xl border border-slate-800/80 p-1.5 pb-6 pt-2 rounded-t-[32px] w-full max-w-lg shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.5)] pointer-events-auto grid grid-cols-5 gap-1 items-end justify-items-center">
                        <button onClick={() => { setActiveTab('list'); setSearchTerm(''); setFilterStatus('all'); window.scrollTo({top:0, behavior:'smooth'}); }} className={`flex flex-col items-center gap-1 p-2 rounded-2xl w-full transition-all ${activeTab === 'list' && filterStatus === 'all' ? 'text-[#8bf5fa] bg-[#8bf5fa]/10' : 'text-slate-500 hover:text-[#8bf5fa]'}`}><Home size={18} strokeWidth={2.5} /><span className="text-[7px] font-black uppercase tracking-wide">Inicio</span></button>
                        <button onClick={() => { setActiveTab('calendar'); window.scrollTo({top:0, behavior:'smooth'}); }} className={`flex flex-col items-center gap-1 p-2 rounded-2xl w-full transition-all ${activeTab === 'calendar' ? 'text-[#8bf5fa] bg-[#8bf5fa]/10' : 'text-slate-500 hover:text-[#8bf5fa]'}`}><Calendar size={18} strokeWidth={2.5} /><span className="text-[7px] font-black uppercase tracking-wide">Agenda</span></button>
                        <div className="flex justify-center w-full"><button onClick={() => { setNewClient({ name: '', service: '', monthlyFee: '', billingDay: '', phone: '', clientLogo: null, currency: '$' }); setIsModalOpen(true); }} className="bg-[#f9f54b] text-slate-900 p-3 rounded-[20px] shadow-[0_0_15px_rgba(249,245,75,0.3)] -translate-y-5 border-[6px] border-[#0f172a] active:scale-90 transition-transform hover:bg-[#e5e13b]"><Plus size={24} strokeWidth={3} /></button></div>
                        <button onClick={() => { setActiveTab('clients'); setFilterStatus('all'); window.scrollTo({top:0, behavior:'smooth'}); }} className={`flex flex-col items-center gap-1 p-2 rounded-2xl w-full transition-all ${activeTab === 'clients' ? 'text-[#8bf5fa] bg-[#8bf5fa]/10' : 'text-slate-500 hover:text-[#8bf5fa]'}`}><Users size={18} strokeWidth={2.5} /><span className="text-[7px] font-black uppercase tracking-wide">Clientes</span></button>
                        <button onClick={() => { setActiveTab('invoice'); window.scrollTo({top:0, behavior:'smooth'}); }} className={`flex flex-col items-center gap-1 p-2 rounded-2xl w-full transition-all ${activeTab === 'invoice' ? 'text-[#8bf5fa] bg-[#8bf5fa]/10' : 'text-slate-500 hover:text-[#8bf5fa]'}`}><Receipt size={18} strokeWidth={2.5} /><span className="text-[7px] font-black uppercase tracking-wide">Factura</span></button>
                    </div>
                </div>
              </div>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
